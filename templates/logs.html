<!DOCTYPE html>
<html>
<head>
    <title>Alarm History</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        h2 { color: var(--blue); display: flex; align-items: center; justify-content: space-between; }
        .btn { padding: 8px 16px; color: var(--blue); border: 1px solid var(--blue); text-decoration: none; border-radius: 6px; font-size: 0.8em; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        .log-table th { background: #1c2128; color: var(--blue); padding: 12px; text-align: left; border: 1px solid var(--border); }
        .log-table td { padding: 10px; border: 1px solid var(--border); }
        .empty-state { text-align: center; padding: 60px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Alarm History <a href="/" class="btn">← Dashboard</a></h2>
        <div id="table-container">Loading logs...</div>
    </div>
    <script>
        async function refreshLogs() {
            try {
                const response = await fetch('/logs?refresh=1');
                const html = await response.text();
                document.getElementById('table-container').innerHTML = html;
            } catch (err) { console.error(err); }
        }
        setInterval(refreshLogs, 2000);
        refreshLogs();
    </script>
</body>
</html>
